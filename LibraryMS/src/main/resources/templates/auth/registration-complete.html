<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head (title='Registration complete — Library')}"></head>
<body class="page-auth">
<header th:replace="~{fragments/layout :: site-header}"></header>

<main class="auth-shell">
    <div class="auth-card card-elevated">
        <h1 class="auth-title">Registration complete</h1>
        <div class="alert alert-success" role="status" th:if="${registrationSuccessMessage}">
            <p th:text="${registrationSuccessMessage}">Success.</p>
        </div>
        <p class="auth-sub">Your library user ID is below. Please save it — you may need it when talking to staff.</p>
        <p class="registered-user-id-wrap">
            <span class="registered-user-id-label">Your user ID</span>
            <code class="registered-user-id" th:text="${registeredPlainUserId}">uuid</code>
        </p>
        <div class="stack-form" style="margin-top: 1.25rem;">
            <a class="btn btn-primary btn-block" th:href="@{/login}">Continue to sign in</a>
            <a class="btn btn-outline btn-block" th:href="@{/register}">Register another account</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: site-footer}"></footer>
</body>
</html>
