<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head (title='Librarian — Library')}"></head>
<body class="page-dashboard">
<header th:replace="~{fragments/layout :: site-header}"></header>
<main class="container dashboard-main">
    <section class="dashboard-hero card-elevated">
        <div class="dashboard-hero-layout">
            <div class="dashboard-profile-slot" th:if="${profilePictureUrl != null}">
                <img class="dashboard-avatar" th:src="${profilePictureUrl}" alt="Your profile photo"
                     th:style="|object-position: ${profilePictureFocalX}% ${profilePictureFocalY}%|"/>
            </div>
            <div class="dashboard-hero-main">
                <p class="eyebrow">Librarian</p>
                <h1>Welcome to the librarian desk</h1>
                <p class="lede"><strong sec:authentication="principal.fullName">Librarian</strong>
                    <span class="lede-email">(<span sec:authentication="name">email</span>)</span> — this dashboard will host circulation,
            holds, and reader support tools.</p>
                <ul class="checklist">
                    <li>Check books in and out</li>
                    <li>Approve or extend borrowing when enabled</li>
                    <li>Assist students with catalog searches</li>
                </ul>
                <div class="dashboard-actions">
                    <a class="btn btn-primary" th:href="@{/librarian/books}">Manage books</a>
                    <a class="btn btn-primary" th:href="@{/librarian/borrow-requests}">Review borrow requests</a>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/layout :: site-footer}"></footer>
</body>
</html>
