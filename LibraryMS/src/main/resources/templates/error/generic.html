<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — Library'">Error — Library</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page-auth">
<header th:replace="~{fragments/layout :: site-header}"></header>
<main class="auth-shell">
    <div class="auth-card card-elevated">
        <p class="eyebrow" th:text="${status}">400</p>
        <h1 class="auth-title" th:text="${title}">Error</h1>
        <p class="auth-sub" th:text="${message}">Something went wrong.</p>
        <p><a class="btn btn-primary" th:href="@{/}">Go to home</a></p>
    </div>
</main>
<footer th:replace="~{fragments/layout :: site-footer}"></footer>
</body>
</html>
