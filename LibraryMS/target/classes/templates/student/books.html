<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head (title='Search Books — Student')}"></head>
<body class="page-dashboard">
<header th:replace="~{fragments/layout :: site-header}"></header>
<main class="container dashboard-main dashboard-main-wide student-books-main-wide">
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a th:href="@{/student/dashboard}">Student</a>
        <span aria-hidden="true"> / </span>
        <span>Search books</span>
    </nav>

    <div th:if="${flashSuccess}" class="alert alert-success" role="status" th:text="${flashSuccess}">Saved</div>
    <div th:if="${flashError}" class="alert alert-error" role="alert" th:text="${flashError}">Error</div>
    <div th:if="${flashWarn}" class="alert alert-warn" role="alert" th:text="${flashWarn}">Warning</div>

    <section class="dashboard-hero card-elevated">
        <p class="eyebrow">Catalog</p>
        <h1>Search books</h1>
        <p class="lede">Find books by title, author, category, or ISBN, then submit a borrow request.</p>

        <form class="status-inline-form student-books-search-form" th:action="@{/student/books}" method="get">
            <input id="studentBookSearchInput" class="input" type="text" name="q" th:value="${query}" placeholder="Search by title, author, category, ISBN"/>
            <button type="submit" class="btn btn-outline">Search</button>
            <a id="studentBookSearchClear" class="btn btn-ghost" th:href="@{/student/books}">Clear</a>
        </form>

        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Available</th>
                    <th class="actions-cell">Borrow</th>
                </tr>
                </thead>
                <tbody id="studentBooksTableBody">
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="5" class="empty-state">No books found for this query.</td>
                </tr>
                <tr th:each="book : ${books}" class="student-book-row"
                    th:attr="data-search-value=${#strings.toLowerCase((book.title ?: '') + ' ' + (book.author ?: '') + ' ' + (book.category ?: '') + ' ' + (book.isbn ?: ''))}">
                    <td data-label="Title" th:text="${book.title}">Title</td>
                    <td data-label="Author" th:text="${book.author}">Author</td>
                    <td data-label="Category" th:text="${book.category != null ? book.category : '—'}">—</td>
                    <td data-label="Available">
                        <span th:text="${book.availableCopies}">0</span>/<span th:text="${book.totalCopies}">0</span>
                    </td>
                    <td class="actions-cell" data-label="Borrow">
                        <th:block th:if="${book.availableCopies > 0}">
                            <form class="status-inline-form" th:action="@{/student/books/request}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="bookId" th:value="${book.bookId}"/>
                                <select class="input input-sm" name="durationDays">
                                    <option value="7" th:selected="${book.maxBorrowDays == 7}">7 days</option>
                                    <option value="14" th:if="${book.maxBorrowDays >= 14}" th:selected="${book.maxBorrowDays == 14}">14 days</option>
                                    <option value="21" th:if="${book.maxBorrowDays >= 21}" th:selected="${book.maxBorrowDays == 21}">21 days</option>
                                    <option value="28" th:if="${book.maxBorrowDays >= 28}" th:selected="${book.maxBorrowDays >= 28}">28 days</option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm">
                                    Request
                                </button>
                            </form>
                        </th:block>
                        <th:block th:if="${book.availableCopies <= 0}">
                            <form class="status-inline-form" th:action="@{/student/reservations}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="bookId" th:value="${book.bookId}"/>
                                <select class="input input-sm" name="durationDays">
                                    <option value="7" th:selected="${book.maxBorrowDays == 7}">7 days</option>
                                    <option value="14" th:if="${book.maxBorrowDays >= 14}" th:selected="${book.maxBorrowDays == 14}">14 days</option>
                                    <option value="21" th:if="${book.maxBorrowDays >= 21}" th:selected="${book.maxBorrowDays == 21}">21 days</option>
                                    <option value="28" th:if="${book.maxBorrowDays >= 28}" th:selected="${book.maxBorrowDays >= 28}">28 days</option>
                                </select>
                                <button type="submit" class="btn btn-outline btn-sm">
                                    Reserve
                                </button>
                            </form>
                        </th:block>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/layout :: site-footer}"></footer>
<script>
    (function () {
        const REFRESH_INTERVAL_MS = 1000;
        const searchInput = document.getElementById('studentBookSearchInput');
        const clearLink = document.getElementById('studentBookSearchClear');
        const tableBody = document.getElementById('studentBooksTableBody');

        if (!searchInput || !tableBody) {
            return;
        }

        const collectRows = function () {
            return Array.from(document.querySelectorAll('#studentBooksTableBody .student-book-row'));
        };

        const applyFilter = function () {
            const query = searchInput.value.trim().toLowerCase();
            const rows = collectRows();
            rows.forEach(function (row) {
                const searchValue = row.getAttribute('data-search-value') || '';
                row.style.display = searchValue.includes(query) ? '' : 'none';
            });
        };

        const hasActiveInteractiveElement = function () {
            const active = document.activeElement;
            if (!active) {
                return false;
            }
            if (active.matches('input, textarea, select, button, a, [contenteditable="true"], [tabindex]:not([tabindex="-1"])')) {
                return true;
            }
            return false;
        };

        const hasActiveTextSelection = function () {
            const selection = window.getSelection();
            return Boolean(selection && !selection.isCollapsed && String(selection).trim().length > 0);
        };

        const refreshRows = function () {
            if (document.hidden || hasActiveInteractiveElement() || hasActiveTextSelection()) {
                return;
            }
            fetch(window.location.pathname, {
                method: 'GET',
                credentials: 'same-origin',
                cache: 'no-store',
                headers: {
                    'X-Requested-With': 'student-books-live-refresh'
                }
            })
                .then(function (response) {
                    if (!response.ok) {
                        return null;
                    }
                    return response.text();
                })
                .then(function (html) {
                    if (!html) {
                        return;
                    }
                    const parser = new DOMParser();
                    const nextDoc = parser.parseFromString(html, 'text/html');
                    const nextBody = nextDoc.getElementById('studentBooksTableBody');
                    if (!nextBody) {
                        return;
                    }
                    if (tableBody.innerHTML !== nextBody.innerHTML) {
                        tableBody.innerHTML = nextBody.innerHTML;
                        applyFilter();
                    }
                })
                .catch(function () {
                    // Ignore transient refresh errors and retry on next interval.
                });
        };

        searchInput.addEventListener('input', applyFilter);

        if (clearLink) {
            clearLink.addEventListener('click', function (event) {
                event.preventDefault();
                searchInput.value = '';
                applyFilter();
                searchInput.focus();
            });
        }

        applyFilter();
        window.setInterval(refreshRows, REFRESH_INTERVAL_MS);
    })();
</script>
</body>
</html>
