<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Something went wrong — Library</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="page-auth">
<header th:replace="~{fragments/layout :: site-header}"></header>
<main class="auth-shell">
    <div class="auth-card card-elevated">
        <h1 class="auth-title">Something went wrong</h1>
        <p class="auth-sub">Please try again in a moment. If the problem continues, contact the library.</p>
        <p><a class="btn btn-primary" th:href="@{/}">Go to home</a></p>
    </div>
</main>
<footer th:replace="~{fragments/layout :: site-footer}"></footer>
</body>
</html>
