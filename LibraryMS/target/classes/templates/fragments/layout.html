<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:fragment="head (title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Library</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:fragment="site-header" class="site-header">
    <div class="container header-inner">
        <a class="brand" th:href="@{/}">Library<span class="brand-accent">MS</span></a>
        <nav class="nav-links" aria-label="Main">
            <th:block sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Sign in</a>
                <a class="btn btn-outline" th:href="@{/register}">Create account</a>
            </th:block>
            <th:block sec:authorize="isAuthenticated()">
                <span th:if="${#authentication.principal.profilePicture != null}" class="header-avatar-slot">
                    <img th:src="${#authentication.principal.profilePicture}"
                         class="header-avatar" alt=""
                         th:style="|object-position: ${#authentication.principal.profilePictureFocalXEffective}% ${#authentication.principal.profilePictureFocalYEffective}%|"/>
                </span>
                <span class="nav-user-block">
                    <span class="nav-user-name" sec:authentication="principal.fullName"></span>
                    <span class="nav-user-email" sec:authentication="name"></span>
                </span>
                <form class="inline-logout" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-ghost">Sign out</button>
                </form>
            </th:block>
        </nav>
    </div>
</header>

<footer th:fragment="site-footer" class="site-footer">
    <div class="container">
        <p>Library Management System — authentication module</p>
    </div>
</footer>
</body>
</html>
