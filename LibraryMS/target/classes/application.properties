# Application
spring.application.name=library-management

# Reversible password encryption (AES-256-GCM) — lab / admin view only; change for production & keep secret safe.
# Must be at least 16 characters. Same value must be used to decrypt existing rows.
app.security.password-secret=LibraryLab2026_ChangeThis_ToYourOwnLongRandomSecret_Key!

# Optional: legacy only — if old rows used U1:-prefixed encrypted user ids, this key must match how they were created.
# app.security.user-id-secret=AnotherLongRandomSecret_OnlyForUserIds_32charsPlus!

# Profile picture uploads inside project folder (next to LibraryMS module)
app.upload.dir=${user.dir}/../uploads/profile-pictures
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# MySQL — create database library_db and run the provided schema before starting
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=Admin1234

# In local development, always pick a free port (prevents "Port 8080 already in use").
server.port=8081

# Auto logout after 15 minutes of inactivity (applies to all authenticated portals)
server.servlet.session.timeout=15m

# Open the default browser when the app is ready (works in Eclipse, IntelliJ, VS Code, mvn spring-boot:run).
# Set to false for production, CI, or headless environments.
app.browser.open-on-start=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# No auto-generated in-memory user (we use custom authentication)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Thymeleaf
spring.thymeleaf.cache=false

# Do not expose exception messages, stack traces, or binding errors to clients (HTML or JSON error responses).
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Fine calculation
# Amount charged per overdue day (adjust to your library's currency/rate)
app.fine.per-day-rate=10.0

# Reservation / waitlist
# Hours a student has to pick up a book after being notified (READY status)
app.reservation.pickup-window-hours=48

# Admin maintenance
# Backup button writes exactly one file and replaces it on each run.
app.maintenance.backup.dir=${user.dir}/../DB_BackUP
app.maintenance.backup.filename=library_db_backup.sql
# Comma-separated directories safe to clean on each maintenance run.
# Keep this list to non-critical temporary/cache folders only.
app.maintenance.cleanup.paths=${java.io.tmpdir}/library-management,${java.io.tmpdir}/library-management-cache,${user.home}/.library-management/tmp
